<svg xmlns="http://www.w3.org/2000/svg" width="425" height="310">
  <style>
    .cell { fill: #888; stroke: #222; stroke-width: 1px; }
  </style>
  <defs>
    <rect id="cell" width="50" height="50" rx="4"/>
  </defs>
  <use href="#cell" x="5"   y="0"   class="cell"/>
  <use href="#cell" x="60"  y="55"  class="cell"/>
  <use href="#cell" x="160" y="165" class="cell"/>
  <use href="#cell" x="160" y="110" class="cell"/>
  <use href="#cell" x="215" y="165" class="cell"/>
  <use href="#cell" x="315" y="220" class="cell"/>
  <use href="#cell" x="370" y="220" class="cell"/>
</svg>
