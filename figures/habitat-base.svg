<svg xmlns="http://www.w3.org/2000/svg" width="425" height="310">
  <style>
    .cell { fill: #888; stroke: #222; stroke-width: 1px; }
    .habitat-rule { fill: none; stroke: #888; stroke-width: 1px; }
    .habitat-label { fill: #888; font-family: "Source Code Pro", monospace; font-size: 24px; text-anchor: middle; }
  </style>
  <defs>
    <rect id="cell" width="50" height="50" rx="4"/>
  </defs>
  <use href="#cell" x="5" y="220" class="cell"/>
  <line x1="0"   x2="115" y1="278" y2="278" class="habitat-rule"/>
  <line x1="155" x2="270" y1="278" y2="278" class="habitat-rule"/>
  <line x1="310" x2="425" y1="278" y2="278" class="habitat-rule"/>
  <text x="57"  y="303" class="habitat-label">A</text>
  <text x="212" y="303" class="habitat-label">B</text>
  <text x="367" y="303" class="habitat-label">C</text>
</svg>
